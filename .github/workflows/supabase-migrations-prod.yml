name: Supabase Migrations (Prod)

on:
  push:
    branches:
      - main
    paths:
      - "web/supabase/migrations/*.sql"
      - ".github/workflows/supabase-migrations-prod.yml"
  workflow_dispatch:
    inputs:
      dry_run_only:
        description: "Only run migration dry-run (no apply)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: supabase-prod-migrations
  cancel-in-progress: false

jobs:
  migrate-prod:
    name: Push Migrations To Prod
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: web
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secret
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "Missing required secret: SUPABASE_DB_URL_PROD"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Show migration plan (dry-run)
        run: supabase db push --dry-run --db-url "$SUPABASE_DB_URL"

      - name: Apply migrations
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run_only) }}
        run: supabase db push --yes --db-url "$SUPABASE_DB_URL"

      - name: Verify migration history
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run_only) }}
        run: supabase migration list --db-url "$SUPABASE_DB_URL"
